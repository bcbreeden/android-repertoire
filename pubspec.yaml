name: repertoire
description: A mobile app for pianists to track their practice progress on musical pieces.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  sqflite: ^2.3.0
  path: ^1.8.3
  provider: ^6.1.1
  intl: ^0.19.0
  cupertino_icons: ^1.0.6
  lottie: ^3.0.0
  in_app_purchase: ^3.2.0
  shared_preferences: ^2.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  integration_test:
    sdk: flutter
  sqflite_common_ffi: ^2.4.0+3

flutter:
  uses-material-design: true
